<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/login-new.css">
    <title>Login | Milou</title>
</head>

<body>
    <div class="compose-container">
        <h2>Login form</h2>
        <form id="loginForm">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="example@milou.com" required />

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Password" required />

            <div class="buttons">
                <button type="submit">Log In</button>
            </div>
            <p class="no-account">Don't have an account?<span id="registerBtn" class="register">register</span></p>

        </form>
    </div>

    <script src="/js/login.js"></script>
</body>

</html>
