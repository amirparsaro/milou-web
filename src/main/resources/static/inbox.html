<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/inbox.css">
    <title>Inbox | Milou</title>
</head>

<body>
<div class="sidebar">
    <div class="logo-container">
        <img src="assets/milou.png" class="logo">
        <h2 class="title">Milou</h2>
    </div>
    <div class="links">
        <p>All</p>
        <p>Unread</p>
        <p>Sent</p>
        <p>Search by code</p>
    </div>

    <div class="compose-container">
        <button class="compose">Compose</button>
    </div>
</div>

<div class="main">
    <div class="header">
        <h2>Inbox</h2>
    </div>

    <div class="inbox">
        <div class="email-list">
            <div class="email-item"><strong>John Doe</strong><br>Meeting at 3PM</div>
            <div class="email-item"><strong>Amazon</strong><br>Your order has shipped</div>
            <div class="email-item"><strong>GitHub</strong><br>New login detected</div>
        </div>

        <div class="email-content">
            <h3>Subject</h3>
            <p>Click on an email to see the content here.</p>
        </div>
    </div>
</body>

</html>
