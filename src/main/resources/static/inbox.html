<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/inbox-new.css">
    <title>Inbox | Milou</title>
</head>

<body>
    <div class="sidebar">
        <div class="logo-container">
            <img src="assets/milou.png" class="logo">
            <h2 class="title">Milou</h2>
        </div>
        <div class="links">
            <p>All</p>
            <p>Unread</p>
            <p>Sent</p>
            <p>Search by code</p>
        </div>

        <div class="compose-container">
            <button class="compose" id="compose">Compose</button>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div class="head">
                <h2>Inbox</h2>
            </div>
            <div class="login">
                <button class="compose" id="logout">logout</button>
                <h3></h3>
            </div>
        </div>

        <div class="inbox">
            <div class="email-list">
            </div>

            <div class="email-content">
                <h3>Subject</h3>
                <p>Click on an email to see the content here.</p>
            </div>
        </div>

        <script src="/js/inbox.js"></script>
</body>

</html>
