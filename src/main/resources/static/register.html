<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/register-new.css">
    <title>Register | Milou</title>
</head>

<body>
<div class="compose-container">
    <h2>Register form</h2>
    <form id="registerForm">
        <label for="name">Username:</label>
        <input type="text" id="name" name="name" placeholder="Username" required/>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="example@milou.com or example" required/>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Password" required/>

        <div class="buttons">
            <button type="submit">Register</button>
        </div>
        <p class="yes-account">Already have an acocunt?<span id="loginBtn" class="login">login</span></p>

    </form>
</div>

    <script src="/js/register.js"></script>
</body>

</html>
